actions:
  troubleshooting:
    items:
      show-status:
        label: Show MCUs Version
        description: Display firmware version of all connected MCUs.
        cmd:
          - /home/lava/bin/systemUpgrade.sh
          - show-status
        background: false
        message: "System status:"

      check-for-updates:
        label: Check for Updates
        description: Compare the installed build against the latest GitHub release and show the download URL.
        cmd:
          - bash
          - -c
          - |
            CURRENT_BUILD=$(cat /etc/BUILD_VERSION 2>/dev/null | tr -d '[:space:]' || echo "unknown")
            CURRENT_PROFILE=$(cat /etc/BUILD_PROFILE 2>/dev/null | tr -d '[:space:]' || echo "unknown")
            echo "Installed build : $CURRENT_BUILD"
            echo "Profile         : $CURRENT_PROFILE"
            echo ""
            echo "Fetching latest release from GitHub..."
            RESPONSE=$(/usr/local/bin/curl -sf --max-time 10 \
              "https://api.github.com/repos/paxx12/SnapmakerU1-Extended-Firmware/releases/latest")
            if [ -z "$RESPONSE" ]; then
              echo "ERROR: Could not reach GitHub. Check your network connection."
              exit 1
            fi
            TAG=$(echo "$RESPONSE" | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)
            NAME=$(echo "$RESPONSE" | grep -o '"name": *"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Latest release  : $NAME ($TAG)"
            echo ""
            PROFILE_KEY=$(echo "$CURRENT_PROFILE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z].*$//')
            BIN_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": *"[^"]*\.bin"' | \
              grep -i "$PROFILE_KEY" | head -1 | cut -d'"' -f4)
            if [ -z "$BIN_URL" ]; then
              BIN_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": *"[^"]*\.bin"' | \
                head -1 | cut -d'"' -f4)
            fi
            if [ -n "$BIN_URL" ]; then
              echo "Download URL    :"
              echo "$BIN_URL"
              echo ""
              echo "To upgrade: copy the URL above and paste it into"
              echo "'Firmware Upgrade (URL)' on this page."
            else
              echo "(No .bin asset found in this release)"
            fi
        message: "Checking for updates..."

      collect-logs:
        label: Collect System Logs
        description: Bundle and download a system log archive for troubleshooting.
        confirm: "Collecting system logs might take a few minutes. These logs contain sensitive information like the serial number and Wi-Fi SSID, and should not be shared publicly. Continue?"
        cmd:
          - /home/lava/bin/sysinfoCollection.sh
          - "no"
          - /userdata/logs.tar.gz
        message: "Collecting system logs..."
        download_file: /userdata/logs.tar.gz

  recovery:
    items:
      reset-extended-to-defaults:
        label: Reset Extended to Defaults
        description: Clear all extended settings and reboot to a clean state.
        confirm: "Reset all extended settings to defaults and reboot?"
        background: true
        cmd:
          - /bin/bash
          - -xc
          - |
            rm -f /oem/.printer_data /oem/.debug &&
            touch /oem/.extended-recover &&
            /sbin/reboot
        message: "Resetting extended to defaults..."

      reset-to-backup-firmware:
        label: Reset Extended to Backup Firmware
        description: Clear all extended settings, switch to the backup firmware slot, and reboot.
        confirm: "Reset all extended settings to defaults, switch to backup firmware and reboot?"
        background: true
        cmd:
          - /bin/bash
          - -xc
          - |
            rm -f /oem/.printer_data /oem/.debug &&
            touch /oem/.extended-recover &&
            updateEngine --misc=other --reboot
        message: "Resetting to backup firmware..."

      switch-to-backup-firmware:
        label: Switch to Backup Firmware
        description: Boot from the backup firmware slot on next reboot.
        confirm: "Switch to backup firmware and reboot?"
        background: true
        cmd:
          - /bin/bash
          - -xc
          - |
            rm -f /oem/.printer_data /oem/.debug &&
            updateEngine --misc=other --reboot
        message: "Switching to backup firmware..."
